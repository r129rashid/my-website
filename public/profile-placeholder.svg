<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" fill="#111118"/>
  <!-- Subtle grid -->
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1E1E2E" stroke-width="1"/>
  </pattern>
  <rect width="400" height="400" fill="url(#grid)"/>
  <!-- Gold gradient ring -->
  <circle cx="200" cy="200" r="160" stroke="url(#ringGrad)" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.5"/>
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="avatarGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#1A1A26"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </radialGradient>
  </defs>
  <!-- Avatar body -->
  <circle cx="200" cy="200" r="130" fill="url(#avatarGrad)" stroke="#1E1E2E" stroke-width="1"/>
  <!-- Head -->
  <circle cx="200" cy="165" r="52" fill="#1E1E2E"/>
  <!-- Shoulders -->
  <ellipse cx="200" cy="310" rx="90" ry="65" fill="#1E1E2E"/>
  <!-- Gold accent dot -->
  <circle cx="200" cy="165" r="4" fill="#C9A84C" opacity="0.6"/>
  <!-- Initials -->
  <text x="200" y="178" text-anchor="middle" dominant-baseline="middle" font-family="Georgia, serif" font-size="36" font-weight="700" fill="#C9A84C" opacity="0.9">RR</text>
</svg>
